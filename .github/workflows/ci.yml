name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Backend — lint + test
  # ─────────────────────────────────────────────
  backend-ci:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (type-check)
        run: pnpm lint

      - name: Run tests with coverage
        run: pnpm test:coverage

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-backend
          path: backend/allure-results
          retention-days: 7

  # ─────────────────────────────────────────────
  # Job 2: Frontend — lint + test
  # ─────────────────────────────────────────────
  frontend-ci:
    name: Frontend — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (type-check)
        run: pnpm lint

      - name: Run tests with coverage
        run: pnpm test:coverage

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-frontend
          path: frontend/allure-results
          retention-days: 7

  # ─────────────────────────────────────────────
  # Job 3: Allure report — generate + deploy
  # Only runs on push to main (not on PRs)
  # ─────────────────────────────────────────────
  allure-report:
    name: Allure Report — Generate & Deploy
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download backend Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-backend
          path: allure-results

      - name: Download frontend Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-frontend
          path: allure-results

      - name: Restore Allure history from gh-pages
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Copy history into results
        run: |
          if [ -d gh-pages/history ]; then
            echo "Restoring test history from gh-pages"
            cp -r gh-pages/history allure-results/history
          else
            echo "No previous history found — first run"
          fi

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Generate Allure report
        run: allure generate allure-results --clean -o allure-report

      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
